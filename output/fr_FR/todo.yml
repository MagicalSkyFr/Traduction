    skill: <glyph:validation_tchat> <color:#40ff70>Ton armure est intégralement équipée, tu bénéficies de la compétence {skill} en bonus !</color>
  armor_full_required: <glyph:warning_tchat> <color:#ff383b>Tu dois porter une armure intégrale pour profiter de la compétence bonus !</color>
  armor_missing: <glyph:warning_tchat> <color:#ff383b>Ton armure n'est pas intégralement équipée, équipe toi d'un set d'armure pour bénéficier des compétences sur ton armure</color>
  notskilloffhand: <glyph:warning_tchat> <color:#ff383b> Tu ne peux lancer de sort si ton item de la deuxième main est aussi un item avec des compétences
