    max: <glyph:warning_tchat> <color:#ff383b> Tu as déjà le nombre maximal de sort sur ta baguette !
    notremove: <glyph:warning_tchat> <color:#ff383b> Tu ne peux pas retiré ce sort
    remove: <glyph:validation_tchat> <color:#40ff70> Tu viens de retiré le sort de ta baguette !
  sound:
    active: <green><bold> Son activée </bold>pour {name}</green>
    inactive: <red><bold> Son désactivé </bold>pour {name}</red>
dungeon:
  already:
    builder: Tu es déjà dans un session de donjon en création
    in: Tu es déjà dans un donjon
  build: La session du donjon a été créer
  builderror: 'Une erreur est survenir lors de la création du donjon : {error}, par prévention, celui çi a été annulé'
  death: '{playername} a perdu une vie dans le donjon'
  global:
    end: Le donjon de {owner} vient de se finir !
  invite:
    accept: Tu as rejoins le donjon !
    acceptall: '{playername} a rejoint le donjon'
    edit: Modification de la session détecté, le cooldown de création de la session est reinitialisé
    refuse: Tu as refusé l'invitation au donjon
    refuseall: '{playername} a refusé l''invitation au donjon'
    remove: Tu as été éjecté du donjon
    removeall: '{playername} a été éjecté du donjon'
    removeinvited: Ton invitation au donjon est révolu
    send: Tu as été invité à rejoindre le donjon de {ownername}, fais /donjon pour accepter ou refuser
    sendall: '{playername} a été invité à rejoindre le donjon'
  notifwhenstart: La session a été mis dans la queue, une notification te sera envoyé quand la session sera presque créer. Tu peux toujours ajouter des membres pendant ce temps.
  retarded: Toutes les instances de ce donjon sont prise, vous serez téléporter lorsqu'une place sera disponible, place {place}
  startbuild: La session du donjon sera créer dans 30 secondes
tutoriel:
  add_sort:
    astuce:
      1: COMMENT CONFIGURER
    message: ꗎ
    objectif:
      1: Ajoute le sort X à ta baguette
  ahdeposit:
    astuce:
      1: '<color:#ffc933>Vendre dans l''hôtel des ventes :'
      2: /ah sell
      3: <color:#ffc933>Plus d'informations :</color> <color:white>/wiki ah
    message: "\nꗉ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b> \nꖰ Chasséros est... motivé on va dire. Combattre\nꖰ en donjon et ailleurs peut donner des ressources\nꖰ invendables dans l'adminshop. Mets les en vente\nꖰ dans <color:#ffc933>l'hôtel des ventes</color> !\n\n"
    objectif:
      1: Mettre en vente un objet dans
      2: <color:#ffc933>l'hôtel des ventes</color> <color:white>(/ah)
  bestiaireunlock:
    astuce:
      1: '<color:#ffc933>Ouvrir le bestiaire : </color><color:white>/bestiaire'
      2: '<color:#ffc933>Plus d''infos : </color><color:white>/wiki bestiaire'
    message: "\nꗊ \nꖰ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b> \nꖰ Oui, tu es enfin prêt pour venir semer le carnage\nꖰ avec moi ! <color:#ffc933>Complète ton bestiaire</color> en tuant\nꖰ tous animaux qui existent dans cette dimension !\n\n"
    objectif:
      1: Tue les 16 animaux différents
      2: <color:#ffc933>du terrain de chasse </color><color:white>(%tutoriel_shadow%/16)
  challenge_1:
    astuce:
      1: '<color:#ffc933>Voir les challenges </color><color:white>: /challenge'
      2: '<color:#ffc933>Plus d''informations </color><color:white>: /wiki challenge'
    message: '

      ꗉ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b>

      ꖰ Les challenges que tu as complété te font avancer

      ꖰ dans <color:#ffc933>le challenge de tutoriel</color>. Il est très utile car

      ꖰ il te donna des récompenses utiles, avec

      ꖰ par exemples <color:#ffc933>de nouveaux outils magiques</color> !


      '
    objectif:
      1: Complète l'étape 1 du <color:white>challenge tuto
  challenge_2:
    astuce:
      1: '<color:#ffc933>Voir les challenges </color><color:white>: /challenge'
      2: '<color:#ffc933>Plus d''informations </color><color:white>: /wiki challenge'
    message: '

      ꗉ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b>

      ꖰ On va sortir de l''île et découvrir les incroyables

      ꖰ <color:#ffc933>dimensions </color>! Pour cela on aura besoin d''objets

      ꖰ que tu peux obtenir en complétant

      ꖰ <color:#ffc933>le challenge de tutoriel 2</color>.


      '
    objectif:
      1: Complète l'étape 1 du <color:white>challenge tuto
  challengepierre:
    astuce:
      1: <color:#ffc933>/wiki collection
    message: '

      ꗉ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b>

      ꖰ Tu as complété un challenge ! Fais <color:#ffc933>/challenge</color>

      ꖰ pour tous les voir. Les <color:#ffc933>challenges de collection</color>

      ꖰ donnent des récompenses utiles pour progresser.

      ꖰ Complètes-en un !


      '
    objectif:
      1: Complète le challenge
      2: <color:white>Mineur Marchand 1
  chapanda:
    astuce:
      1: '<color:#ffc933>Voir comment le créer : </color><color:white>/crafts'
      2: '<color:#ffc933>Plus d''informations : </color><color:white>/wiki stuff'
    message: "\nꗉ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b> \nꖰ Ce n'est pas la seule chose utile en combat que\nꖰ tu peux trouver dans la dimension. Tu peux\nꖰ aussi créer <color:#ffc933>des équipements très puissants</color>\nꖰ grâce aux ressources des monstres. Essaie !\n\n"
    objectif:
      1: Crée 1 Chapanda
  chene:
    astuce:
      1: <color:#ffc933>Info sur le bûcheronage :</color>
      2: /wiki bucheron
    message: '

      ꗉ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b>

      ꖰ Tu apprends vite ! Commençons par découvrir

      ꖰ <color:#ffc933>la hache</color>. Essaie la sur un arbre et <color:#ffc933>casse</color>

      ꖰ <color:#ffc933>les feuilles avec</color>, cela te donnera <color:#ffc933>des insectes</color>

      ꖰ grâce à la compétence débloquée !


      '
    objectif:
      1: Casse 8 bûches de chêne <color:white>(%tutoriel_OAK_LOG_value%/%tutoriel_OAK_LOG_max%)
      2: <color:#ffc933>et 4 feuilles de chêne</color> <color:white>(%tutoriel_OAK_LEAVES_value%/%tutoriel_OAK_LEAVES_max%)
  choose_jobs:
    astuce:
      1: <color:#ffc933>/wiki metier
    message: '

      ꗉ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b>

      ꖰ Nous allons maintenant améliorer ton île.

      ꖰ Pour cela il nous faut des <color:#ffc933>MCoins</color>, notre

      ꖰ monnaie locale. <color:#ffc933>Choisis un métier</color> et vend

      ꖰ des objets <color:#ffc933>dans l''adminshop</color> pour en obtenir.


      '
    objectif:
      1: Choisis un métier <color:white>(/jobs)
  cinema:
    astuce:
      1: <color:#ffc933>Tu peux trouver des tutoriels pour
      2: <color:#ffc933>créer un générateur sur internet.
    message: '

      ꗉ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b>

      ꖰ Ton générateur est bien mais ce sera insuffisant

      ꖰ pour agrandir ton île. Crée un générateur

      ꖰ <color:#ffc933>plus performant</color> et utilise le pour

      ꖰ miner plus de blocs !


      '
    objectif:
      1: Casse 50 blocs de pierre <color:white>(%tutoriel_COBBLESTONE_value%/%tutoriel_COBBLESTONE_max%)
  claim_axe_pickaxe:
    astuce:
      1: <color:#ffc933>/wiki outil
    message: '

      ꗉ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b>

      ꖰ Sur ton île il y a <color:#ffc933>une hache et une pioche magique</color>

      ꖰ qui vont t''aider. Récupère les ! Et si des amis

      ꖰ t''attendent c''est le moment d''accepter leur

      ꖰ invitation en faisant <color:#ffc933>/is invite</color>.


      '
    objectif:
      1: 'Récupère la hache et la pioche magique  '
  classe5:
    astuce:
      1: <color:#ffc933>/wiki classe
    message: "\nꗉ \nꖰ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b> \nꖰ La zone où on se situe n'est qu'une petite partie\nꖰ de la dimension. Passe à l'étape supérieure\nꖰ en atteignant <color:#ffc933>le niveau 5 de classe</color><color:white> !</color>\n\n"
    objectif:
      1: Atteindre le niveau
      2: <color:#ffc933>de classe 5
  compost:
    astuce:
      1: <color:#ffc933>/wiki mbcompost
    message: "\nꗉ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b> \nꖰ Combattre ici permet d'accéder à des ressources\nꖰ aux usages exceptionnels, comme par exemple\nꖰ <color:#ffc933>améliorer tes multiblocks</color>. Combat des monstres\nꖰ pour obtenir de quoi <color:#ffc933>améliorer ton compost</color>. \n\n"
    objectif:
      1: <color:#ffc933>Améliore 1 multiblock
      2: <color:#ffc933>compost sur ton île
  compostcreate:
    astuce:
      1: <color:#ffc933>Tu as obtenu de quoi compléter le multiblock
      2: <color:#ffc933>en complétant</color><color:white> le challenge de tutoriel 1
    message: '

      ꗍ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b>

      ꖰ Bzzt, je suis Mecanicus et voici mon enseignement.

      ꖰ Crée <color:#ffc933>un coeur de multiblock compost</color> dans

      ꖰ l''établi et <color:#ffc933>complète le compost</color> que j''ai laissé

      ꖰ sur ton île pour me prouver ta valeur.


      '
    objectif:
      1: Crée un multiblock compost <color:white>(/multiblocks)
  consumeregen:
    astuce:
      1: <color:#ffc933>Le plat se crée dans un multiblock établi
      2: '<color:#ffc933>Plus d''infos : </color><color:white>/information cuisine'
    message: "\nꗉ \nꖰ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b> \nꖰ Ces vanilles vont nous servir à <color:#ffc933>créer des sorbets</color>.\nꖰ Rafraichissant mais en plus ils te rendent\nꖰ <color:#ffc933>des points de vie quand tu les manges</color> !\n\n"
    objectif:
      1: <color:#ffc933>Consomme 4 milkshakes
      2: <color:#ffc933>à la vanille </color><color:white>(%tutoriel_shadow%/4)
  cookingbreak:
    astuce:
      1: <color:#ffc933>La vanille de trouve dans la
      2: <color:#ffc933>dimension jungle
      3: '<color:#ffc933>Plus d''infos : </color><color:white>/information cuisine'
    message: "\nꗉ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b> \nꖰ C'est l'heure de l'exploration ! Ces terres\nꖰ regorgent <color:#ffc933>d'ingrédients utiles</color>. Utilise <color:#ffc933>les cisailles</color>\nꖰ obtenues dans le challenge de tutoriel\nꖰ pour en récupérer !\n\n"
    objectif:
      1: Récupère 16 vanilles </color><color:white>(%tutoriel_shadow%/16)
  createisland:
    astuce:
      1: '<color:#ffc933>Réinitialisation de l''île</color> <color:white>: /is reset</color>'
      2: '<color:#ffc933>Voir les îles</color> <color:white>: /warp is</color>'
    message: "\nꗉ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b> \nꖰ Dans notre monde l'accès à la propriété est gratuit.\nꖰ Chacun peut avoir <color:#ffc933>une île</color> dès le début !\nꖰ <click:run_command:'/warp is'><color:#ffc933>[Clique ici]</color></click> pour être téléporté au <color:#ffc933>warp des îles</color>\nꖰ pour les voir et en choisir une.\n\n"
    objectif:
      1: Crée une île <color:white>(/is)</color>
  daily:
    astuce:
      1: '<color:#ffc933>Ouvrir la récompense</color><color:white>: /daily'
      2: '<color:#ffc933>Plus d''infos </color><color:white>: /information daily'
    message: "\nꗉ \nꖰ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b> \nꖰ Super, tu as obtenu les récompenses du challenge !\nꖰ Tu en veux d'autres ? Tu peux faire <color:#ffc933>/daily</color>\nꖰ <color:#ffc933>chaque jour</color> pour obtenir des récompenses !\n\n"
    objectif:
      1: Ouvrir une récompense de daily
  discovery_skip:
    astuce:
      1: '<color:#ffc933>Autre commande de tutoriel : </color>'
      2: <color:white>/tuto help</color>
    message: "\nꗉ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b> \nꖰ Bienvenue ! Je vais t'aider à découvrir notre monde.\nꖰ <color:#ffc933>Complète les objectifs</color> à droite de ton écran pour\nꖰ progresser. Et si un objectif ne te semble pas utile\nꖰ fais <color:#ffc933>/tutoriel skip</color> pour passer à la suite. Essaie !\n\n"
    objectif:
      1: Utilise la commande <color:white>/tuto skip</color>
  dungeoneasy:
    astuce:
      1: <color:#ffc933>/wiki dj
    message: "\nꗉ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b> \nꖰ Maintenant que tu es niveau 5 tu vas pouvoir\nꖰ affronter <color:#ffc933>le donjon de cette dimension</color>.\nꖰ Traverse le portail <color:#ffc933>sur l'île tout au sud</color>\nꖰ de la dimension ou fait <color:#ffc933>/donjon</color>.\n\n"
    objectif:
      1: <color:#ffc933>Terminer le donjon de la
      2: <color:#ffc933>jungle - facile </color><color:white>(/donjon)
  equip_tunic_noob:
    astuce:
      1: <color:#ffc933>Tu peux obtenir la tunique du débutant
      2: <color:#ffc933>en complétant</color><color:white> le challenge de tutoriel 3
    message: "\nꗊ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b> \nꖰ Tu connais désormais tes premiers ennemis.\nꖰ Mais d'autres plus puissants t'attendent !\nꖰ <color:#ffc933>Equipe une tunique du débutant</color> pour\nꖰ être suffisament protégé.\n\n"
    objectif:
      1: Equipe une tunique du débutant
  error:
    no_active_step: Tu as déjà fini le tutoriel !
  finish:
    message: "\nꗉ \nꖰ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color> </b>\nꖰ Bien, que de chemin parcourus. Tu es devenu \nꖰ assez renseigné pour te débrouiller tout seul.\nꖰ J'espère que tu auras beaucoup appris. \n\n \nꗉ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b> \nꖰ Si tu as peur de t'ennuyer sans mon super tuto\nꖰ tu peux faire la commande <color:#ffc933>/wiki objectif</color>.\nꖰ J'ai écris un guide avec de nombreux objectifs\nꖰ à accomplir ! Profite bien de cette aventure. \n\n"
    objectif:
      1: Fin
  finish_dungeon:
    astuce:
      1: <color:#ffc933>/wiki donjon
    message: "\nꗊ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b> \nꖰ Tu sembles avoir du potentiel. Tu es près pour\nꖰ un nouveau défi. Traverse <color:#ffc933>le portail dans</color>\nꖰ <color:#ffc933>la grotte du terrain de chasse</color> ou utilise\nꖰ la commande <color:#ffc933>/donjon</color>. \n\n"
    objectif:
      1: Termine le donjon de
      2: <color:#ffc933>l'apprenti chasseur
  fishing:
    astuce:
      1: <color:#ffc933>/wiki peche
    message: "\nꗉ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b> \nꖰ Il existe ici un grand lac. Fait un clic droit sur\nꖰ <color:#ffc933>la canne à pêche magique</color> dans ton inventaire\nꖰ et <color:#ffc933>mets dedans des insectes</color>. Tu pourras ensuite\nꖰ pêcher <color:#ffc933>des poissons spéciaux</color> !\n\n"
    objectif:
      1: Pêche 8 poissons
      2: <color:#ffc933>magiques </color><color:white>(%tutoriel_shadow%/8)
  islandlevel2:
    astuce:
      1: '<color:#ffc933>Déposer le bloc : <color:white>/is offrande'
      2: '<color:#ffc933>Voir comment créer le bloc : </color><color:white>/crafts'
      3: '<color:#ffc933>Plus d''informations : </color><color:white>/wiki offrande'
    message: '

      ꗉ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b>

      ꖰ Pour améliorer ton île, elle doit être du bon

      ꖰ niveau. On va donner un <color:#ffc933>bloc de niveau végétal</color>

      ꖰ pour gagner de l''expérience et faire passer

      ꖰ ton île <color:#ffc933>au niveau 2</color> !


      '
    objectif:
      1: Etre sur une île de niveau 2
  islandupgradecobblegen:
    astuce:
      1: <color:#ffc933>/wiki isupgrade
    message: '

      ꗉ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b>

      ꖰ Parfait, commence par mettre 15725 Mcoins dans

      ꖰ <color:#ffc933>la banque d''île</color>. Ensuite fais <color:#ffc933>/is upgrade</color> pour

      ꖰ ouvrir le menu d''amélioration et améliorer

      ꖰ <color:#ffc933>ta génération de minerais</color>.


      '
    objectif:
      1: <color:#ffc933>Améliore la génération de minerais
      2: <color:#ffc933>de ton île au niveau 2</color><color:white> (/is upgrade)
  ismenu:
    astuce:
      1: <color:#ffc933>/wiki ile
    message: '

      ꗉ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b>

      ꖰ Félicitations, tu possèdes une super île !

      ꖰ Découvre ses fonctionnalités en faisant <color:#ffc933>/ismenu</color>.

      ꖰ Tu peux aussi retourner au point d''apparition

      ꖰ avec la commande <color:#ffc933>/spawn</color>.


      '
    objectif:
      1: Ouvrir le menu d'île <color:white>(/ismenu)</color>
  jungleportail:
    astuce:
      1: '<color:#ffc933>Voir comment le construire :'
      2: /multiblocks
    message: "\nꗉ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b> \nꖰ Je crois qu'on va repartir à l'aventure !\nꖰ Mais pour cela il nous faut <color:#ffc933>un nouveau portail</color>.\nꖰ <color:#ffc933>L'étape 4 du challenge de tutoriel</color> peut te donner\nꖰ les éléments nécessaires.\n\n"
    objectif:
      1: <color:#ffc933>Crée un multiblock portail de
      2: <color:#ffc933>la jungle sur ton île
  mailbox:
    astuce:
      1: '<color:#ffc933>Recettes dans le multiblock</color> :'
      2: /crafts
      3: '<color:#ffc933>Infos sur le multiblock établi</color> :'
      4: <color:#ffc933>/wiki mbetabli
    message: "\nꗉ \nꖰ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b>\nꖰ On peut désormais tester de créer une <color:#ffc933>boîte</color>\nꖰ <color:#ffc933>aux lettres</color>. Tu peux voir comment les créer\nꖰ dans <color:#ffc933>le livre de recette dans le multiblock</color>.\n\n"
    objectif:
      1: 'Crée 1 boîte aux lettres '
  mailboxopen:
    astuce:
      1: <color:#ffc933>/wiki boitelettre
    message: '

      ꗉ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b>

      ꖰ <color:#ffc933>Clique</color> sur ta boîte aux lettres pour l''ouvrir,

      ꖰ il y aura régulièrement des récompense dedans ! Tu peux

      ꖰ aussi faire la commande <color:#ffc933>/mail</color> si tu possèdes

      ꖰ le grade enchanteur.


      '
    objectif:
      1: Ouvre ta boîte aux lettres
  mobkill:
    astuce:
      1: <color:#ffc933>/wiki element
