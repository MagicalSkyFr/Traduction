name: Deploy to Dev
run-name: Deploy Dev — ${{ github.actor }} sur ${{ github.ref_name }}

on:
  push:
    branches:
      - main

env:
  SSH_HOST: ${{ secrets.SSH_HOST }}
  SSH_PORT: ${{ secrets.SSH_PORT }}
  SSH_USER: ${{ secrets.SSH_USER_DEV }}
  REMOTE_PLUGIN_DIR: ${{ secrets.REMOTE_PLUGIN_DIR_DEV }}
  REMOTE_SUBDIR: ${{ secrets.REMOTE_SUBDIR_DEV }}
  TMUX_SESSION: ${{ secrets.TMUX_SESSION }}
  RELOAD_COMMAND: ${{ secrets.RELOAD_COMMAND }}

jobs:
  deploy_dev:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure repository is up to date
        run: |
          git config pull.rebase true
          git pull origin ${{ github.ref_name }}

      - name: Validate
        run: |
          echo "Init terminé sur la branche : ${{ github.ref_name }}"
          echo "Commit : ${{ github.sha }}"
          echo "Auteur : ${{ github.actor }}"

      - name: Ensure remote directory exists
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" \
            "${{ secrets.SSH_USER_DEV }}@${{ secrets.SSH_HOST }}" \
            "mkdir -p ${{ secrets.REMOTE_PLUGIN_DIR }}/${{ secrets.REMOTE_SUBDIR }}/"

      - name: Sync notif directory
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_rsa -p ${{ secrets.SSH_PORT }}" \
            notif/ \
            "${{ secrets.SSH_USER_DEV }}@${{ secrets.SSH_HOST }}:${{ secrets.REMOTE_PLUGIN_DIR }}/${{ secrets.REMOTE_SUBDIR }}/"

      - name: Reload plugin
        run: |
          ssh -i ~/.ssh/id_rsa -p "${{ secrets.SSH_PORT }}" \
            "${{ secrets.SSH_USER_DEV }}@${{ secrets.SSH_HOST }}" \
            "tmux send-keys -t '${{ secrets.TMUX_SESSION }}' '${{ secrets.RELOAD_COMMAND }}' C-m"

      - name: Done
        run: |
          echo "Deploy Dev terminé avec succès"