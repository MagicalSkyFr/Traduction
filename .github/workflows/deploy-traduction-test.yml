name: Deploy Traduction - Test
run-name: ${{ github.actor }} is deploying Traduction to Test

on:
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Pull Traduction on Test
        env:
          DEPLOY_USER: ${{ secrets.SSH_USER_TEST }}
        run: |
          if [ -z "$DEPLOY_USER" ]; then
            echo "❌ DEPLOY_USER manquant pour Test, abandon."
            exit 1
          fi
          ssh -p "${{ secrets.SSH_PORT }}" \
            "${DEPLOY_USER}@${{ secrets.SSH_HOST }}" \
            "~/scripts/deploy-traduction.sh ${{ github.event.pull_request.base.ref }}"