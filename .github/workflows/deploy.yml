name: Deploy Traduction
run-name: ${{ github.actor }} is deploying Traduction

on:
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: "Test"
            user_secret: SSH_USER_TEST
          - name: "Dev"
            user_secret: SSH_USER_DEV

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Pull Traduction on ${{ matrix.target.name }}
        env:
          DEPLOY_USER: ${{ secrets[matrix.target.user_secret] }}
        run: |
          if [ -z "$DEPLOY_USER" ]; then
            echo "❌ DEPLOY_USER manquant pour ${{ matrix.target.name }}, abandon."
            exit 1
          fi
          ssh -p "${{ secrets.SSH_PORT }}" \
            "${DEPLOY_USER}@${{ secrets.SSH_HOST }}" \
            "~/scripts/deploy-traduction.sh ${{ github.event.pull_request.base.ref }}"