        challenge_2:
          astuce:
            1: '<color:#ffc933>Voir les challenges </color><color:white>: /challenge'
            2: '<color:#ffc933>Plus d''informations </color><color:white>: /wiki challenge'
          message: '

            ꗉ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b>

