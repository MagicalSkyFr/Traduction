            \ \nꖰ Cette baguette a des statistiques élevées\nꖰ <color:#ffc933>en élément\
            \ eau</color>. Cela signifie qu'elle fera\nꖰ <color:#ffc933>plus de dégâts\
            \ aux monstres de cet élément</color>.\nꖰ Essaie de tuer quelques rainettes\
            \ avec !\n\n"
          objectif:
            1: Tue 16 rainettes vertes </color><color:white>(%tutoriel_shadow%/16)
        orangeblock:
          astuce:
            1: '<color:#ffc933>Voir comment créer le bloc : </color><color:white>/crafts'
            2: '<color:#ffc933>Plus d''informations : </color><color:white>/wiki islevel'
          message: "\nꗉ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b>\
            \ \nꖰ Avant de faire une nouvelle visite nous devons\nꖰ <color:#ffc933>améliorer\
            \ le bloc de niveau</color> que tu as donné.\nꖰ Dépose un <color:#ffc933>bloc\
            \ de niveau orangé incomplet</color>\nꖰ en offrande pour voir le résultat\
            \ !\n\n"
          objectif:
            1: <color:#ffc933>Dépose 1 bloc de niveau orangé
            2: <color:#ffc933>incomplet dans l'île </color><color:white>(/is offrande)
        portailcreate:
          astuce:
            1: <color:#ffc933>Tu as obtenu de quoi compléter le multiblock
            2: <color:#ffc933>en complétant</color><color:white> le challenge de tutoriel
              2
          message: "\nꗉ \nꖰ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b>\
            \ \nꖰ Bien, tu as obtenu en récompense de ce challenge\nꖰ <color:#ffc933>une\
            \ super épée</color> et de quoi créer <color:#ffc933>un multiblock</color>\n\
            ꖰ <color:#ffc933>portail</color>. Crée le et découvrons ce nouveau monde\
            \ !\n\n"
          objectif:
            1: Avoir un multiblock portail du terrain
            2: <color:#ffc933>de chasse sur l'île </color><color:white>(/multiblocks)</color>
        reset: La progression du tutoriel de {name} a été réinitialiser
        shopcreate:
          astuce:
            1: <color:#ffc933>/wiki shopjoueur
          message: "\nꗉ \nꖰ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b>\
            \ \nꖰ Maintenant on va remplir ce warp de <color:#ffc933>shops</color>\n\
            ꖰ <color:#ffc933>de joueur</color> ! Pose une pancarte sur\nꖰ un coffre\
            \ et suit les instructions.\n\n"
          objectif:
            1: Crée un shop joueur
            2: <color:#ffc933>sur ton île
        spawnercreate:
          astuce:
            1: <color:#ffc933>/wiki spawner
          message: "\nꗊ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b>\
            \ \nꖰ Bien, excellent ! Les <color:#ffc933>coffres des donjons</color>\n\
            ꖰ te donneront de quoi <color:#ffc933>créer des spawners</color>.\nꖰ Je\
            \ te donne quelques objets utiles,\nꖰ crée en un et MASSACRE LES MONSTRES.\n\
            \n"
          objectif:
            1: Crée 1 spawner
        terrainchasse:
          astuce:
            1: '<color:#ffc933>Voir les challenges : </color><color:white>/challenge'
            2: '<color:#ffc933>Plus d''informations : </color><color:white>/wiki challenge'
          message: '

            ꗉ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b>

            ꖰ On va sortir de l''île et découvrir les incroyables

            ꖰ <color:#ffc933>dimensions</color> ! Pour cela on aura besoin d''objets

            ꖰ que tu peux obtenir en complétant <color:#ffc933>le challenge</color>

            ꖰ <color:#ffc933>de tutoriel 2</color>. Termine-le !


            '
          objectif:
            1: Complète le challenge de tutoriel 2
        tinker:
          astuce:
            1: '<color:#ffc933>Voir la création des multiblock : </color><color:white>/multiblocks'
            2: '<color:#ffc933>Plus d''informations : </color><color:white>/wiki etabli'
          message: "\nꗉ \nꖰ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b>\n\
            ꖰ Il nous faut maintenant <color:#ffc933>une machine</color> pour créer\n\
            ꖰ des objets spéciaux : un <color:#ffc933>multiblock établi</color>. Fais\n\
            ꖰ <color:#ffc933>/multiblocks</color> pour voir comment le créer !\n\n"
          objectif:
            1: Construis un multiblock établi sur ton île
        unlock_skill:
          message: "\nꗊ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b>\
            \ \nꖰ Bien. Améliore ton équipement et ton épée\nꖰ en débloquant <color:#ffc933>tes\
            \ premières compétences</color>\nꖰ avec la commande <color:#ffc933>/classe</color>.\
            \ Il te faut\nꖰ PLUS DE PUISSANCE.\n\n"
