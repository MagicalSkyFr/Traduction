          objectif:
            1: <color:#ffc933>Débloque une compétence pour ta pioche</color>
            2: <color:#ffc933>et pour ta hache magique</color> (/jobs)
        upgradestuff:
          astuce:
            1: '<color:#ffc933>Voir comment le construire :'
            2: /multiblocks
            3: '<color:#ffc933>Plus d''informations :'
            4: /wiki mbameliorateur
          message: "\nꗉ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b>\
            \ \nꖰ Tu es devenu très fort. Cependant créer\nꖰ tout le temps de nouveaux\
            \ équipements\nꖰ cela coûte cher. Crée <color:#ffc933>un multiblock</color>\n\
            ꖰ <color:#ffc933>améliorateur</color> et améliore ton équipement !\n\n"
          objectif:
            1: Améliorer 1 équipement
            2: <color:#ffc933>dans l'améliorateur
        warpcreate:
          astuce:
            1: '<color:#ffc933>Créer un warp : </color><color:white>/is setwarp nom'
            2: '<color:#ffc933>Plus d''informations : </color><color:white>/wiki iswarp'
          message: "\nꗉ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b>\
            \ \nꖰ L'hôtel des ventes est utile pour vendre\nꖰ des objets rares mais\
            \ pas pour vendre\nꖰ en grande quantité. On va remédier à cela\nꖰ en créeant\
            \ <color:#ffc933>un warp directement sur ton île</color> !\n\n"
          objectif:
            1: Crée un warp d'île
        warpunlock:
          astuce:
            1: <color:#ffc933>/wiki warps
          message: "\nꗉ \nꖰ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b>\
            \ \nꖰ En explorant ce nouveau monde, fait un <color:#ffc933>clic droit</color>\n\
            ꖰ sur les balises pour les débloquer. Tu pourras\nꖰ ensuite t'y téléporter\
            \ avec la commande <color:#ffc933>/warps</color>.\n\n"
          objectif:
            1: Débloque une balise <color:white>(/warps)
        water_stick:
          astuce:
            1: <color:#ffc933>/wiki magie
          message: "\nꗉ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b>\
            \ \nꖰ Il existe en plus <color:#ffc933>des armes et des baguettes</color>\n\
            ꖰ <color:#ffc933>magiques</color> pour attaquer les monstres. J'en ai\n\
            ꖰ repéré une <color:#ffc933>près des maisons qui sont</color>\nꖰ <color:#ffc933>sur\
            \ le lac</color>. Récupère-là !\n\n"
          objectif:
            1: Obtiens 1 Baguette d'eau
        wikimineur:
          astuce:
            1: <color:#ffc933>/wiki mineur
          message: '

            ꗉ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b>

            ꖰ Notre hache est désormais bien affutée,

            ꖰ on peut tester <color:#ffc933>ta nouvelle pioche</color> !

            ꖰ Utilise la pour casser

            ꖰ <color:#ffc933>quelques pierres</color>.


            '
