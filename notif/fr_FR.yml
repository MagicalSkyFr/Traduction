            1: Débloque les compétences x (/classe)
        unlock_skill_axe_pickaxe:
          astuce:
            1: <color:#ffc933>/wiki competence
          message: '

            ꗉ <b><color:#ffc933>[</color><color:#2bfff4>Tutoriel</color><color:#ffc933>]</color></b>

            ꖰ On dirait que tu intéresses les Dieux ! Chacun

            ꖰ t''expliquera des choses sur sa spécialité

            ꖰ pendant le tutoriel. Fais maintenant <color:#ffc933>/jobs</color>

            ꖰ pour débloquer les compétences.


